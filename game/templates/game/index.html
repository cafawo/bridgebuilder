{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bridge Builder</title>
    <link rel="stylesheet" href="{% static 'game/css/style.css' %}?v=landscape9">
  </head>
  <body>
    <main class="game-shell">
      <form class="seed-panel" id="seed-form">
        <label class="seed-field">
          <span>Seed</span>
          <input id="seed-input" name="seed" type="text" autocomplete="off" spellcheck="false">
        </label>
        <button type="submit">Load</button>
        <button type="button" id="random-seed-button">Random</button>
      </form>
      <canvas
        id="game-canvas"
        width="1240"
        height="700"
        tabindex="0"
        aria-label="Bridge Builder game"
        data-random-level-url="{% url 'game:random-level' %}"
      ></canvas>
    </main>
    <script type="module" src="{% static 'game/js/main.js' %}?v=landscape9"></script>
  </body>
</html>
